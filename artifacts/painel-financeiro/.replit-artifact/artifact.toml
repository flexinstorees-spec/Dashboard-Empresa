kind = "web"
previewPath = "/"
title = "Painel Financeiro"
version = "1.0.0"
id = "artifacts/painel-financeiro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21752

[services.development]
run = "pnpm --filter @workspace/painel-financeiro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/painel-financeiro", "run", "build" ]
publicDir = "artifacts/painel-financeiro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21752"
BASE_PATH = "/"
